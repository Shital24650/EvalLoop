name: EvalLoop CI

on:
  push:
  pull_request:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evalloop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root dependencies
        run: npm install
      - name: Install frontend dependencies
        run: npm --prefix frontend install
      - name: Static checks
        run: npm run check
      - name: Lint
        run: npm run lint
      - name: Smoke tests
        run: node tests/smoke.mjs
      - name: Build frontend
        run: npm run build
      - name: Generate EvalLoop badge
        run: mkdir -p reports && echo '{"schemaVersion":1,"label":"EvalLoop","message":"checked","color":"green"}' > reports/evalloop-badge.json
      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: evalloop-report
          path: evalloop/reports
